<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Research</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: Inter, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      .card { background: #1b1b1b; border: 1px solid #333; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
      input, textarea, button { width: 100%; margin-top: 0.5rem; padding: 0.7rem; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; }
      button { cursor: pointer; background: #2f6feb; border: none; }
      button.secondary { background: #444; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      pre { white-space: pre-wrap; background: #101010; padding: 0.8rem; border-radius: 8px; }
      ul { padding-left: 1.2rem; }
      a { color: #8ab4ff; }
    </style>
  </head>
  <body>
    <h1>Voice Research</h1>
    <div class="card">
      <label>Backend URL</label>
      <input id="backendUrl" value="http://localhost:8000" />

      <label>Query</label>
      <textarea id="query" rows="3" placeholder="Ask a research question..."></textarea>

      <div class="row">
        <button id="recordBtn" class="secondary">Use Browser Speech Recognition</button>
        <button id="researchBtn">Run Research</button>
      </div>
    </div>

    <div class="card">
      <h3>Summary</h3>
      <pre id="summary"></pre>
      <h3>Key Points</h3>
      <ul id="keyPoints"></ul>
      <h3>Sources</h3>
      <ul id="sources"></ul>
      <button id="speakBtn" class="secondary">Speak Summary (ElevenLabs)</button>
      <audio id="player" controls style="width: 100%; margin-top: 0.75rem;"></audio>
    </div>

    <script>
      const queryEl = document.getElementById('query');
      const summaryEl = document.getElementById('summary');
      const keyPointsEl = document.getElementById('keyPoints');
      const sourcesEl = document.getElementById('sources');
      const backendUrlEl = document.getElementById('backendUrl');
      const player = document.getElementById('player');

      document.getElementById('recordBtn').addEventListener('click', () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('SpeechRecognition API not available in this browser.');
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.onresult = (event) => {
          queryEl.value = event.results[0][0].transcript;
        };
        recognition.start();
      });

      document.getElementById('researchBtn').addEventListener('click', async () => {
        const backend = backendUrlEl.value.trim();
        const query = queryEl.value.trim();
        if (!query) return;

        summaryEl.textContent = 'Researching...';
        keyPointsEl.innerHTML = '';
        sourcesEl.innerHTML = '';

        const res = await fetch(`${backend}/api/research`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, max_sources: 5, max_hops: 1 })
        });

        const data = await res.json();
        summaryEl.textContent = data.summary || '';

        (data.key_points || []).forEach((point) => {
          const li = document.createElement('li');
          li.textContent = point;
          keyPointsEl.appendChild(li);
        });

        (data.citations || []).forEach((source) => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = source.url;
          a.target = '_blank';
          a.rel = 'noreferrer';
          a.textContent = source.title || source.url;
          li.appendChild(a);
          if (source.score !== undefined && source.score !== null) {
            li.append(` (score: ${source.score})`);
          }
          sourcesEl.appendChild(li);
        });
      });

      document.getElementById('speakBtn').addEventListener('click', async () => {
        const backend = backendUrlEl.value.trim();
        const text = summaryEl.textContent.trim();
        if (!text) return;

        const res = await fetch(`${backend}/api/tts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (!data.audio_base64) {
          alert('TTS not configured on backend.');
          return;
        }
        player.src = `data:${data.mime_type || 'audio/mpeg'};base64,${data.audio_base64}`;
        await player.play();
      });
    </script>
  </body>
</html>
